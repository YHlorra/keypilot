[meta]
id = "minimax-cn"
name = "MiniMax"
protocol = "openai"
coding_plan = "minimax_cn"
icon = "/icons/providers/minimax.svg"

[endpoint]
default_base_url = "https://api.minimaxi.com/v1"
docs_url = "https://www.minimaxi.com/document"

[auth]
auth_header = "Authorization: Bearer {api_key}"
key_field = "api_key"

[validate_probe]
method = "GET"
path = "/models"
success_status = [200]
parser = "none"

[quota_probe]
method = "GET"
path = "/models"
parser = "none"

[[extras]]
protocol = "anthropic"
base_url = "https://api.minimaxi.com/anthropic"
auth_header = "x-api-key: {api_key}"
validate_probe = { method = "GET", path = "/models", success_status = [200], parser = "none" }
