[meta]
id = "siliconflow"
name = "硅基流动"
protocol = "openai"
icon = "/icons/providers/siliconflow.svg"

[endpoint]
default_base_url = "https://api.siliconflow.cn/v1"
docs_url = "https://docs.siliconflow.cn"

[auth]
auth_header = "Authorization: Bearer {api_key}"
key_field = "api_key"

[validate_probe]
method = "GET"
path = "/models"
success_status = [200]
parser = "none"

[quota_probe]
method = "GET"
path = "/models"
parser = "none"
