[meta]
id = "fireworks"
name = "Fireworks AI"
protocol = "openai"
icon = "/icons/providers/fireworks.svg"

[endpoint]
default_base_url = "https://api.fireworks.ai/inference/v1"
docs_url = "https://docs.fireworks.ai/api-reference"

[auth]
auth_header = "Authorization: Bearer {api_key}"
key_field = "api_key"

[validate_probe]
method = "GET"
path = "/models"
success_status = [200]
parser = "none"

[quota_probe]
method = "GET"
path = "/models"
parser = "none"
