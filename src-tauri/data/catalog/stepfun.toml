[meta]
id = "stepfun"
name = "阶跃星辰"
protocol = "openai"
icon = "/icons/providers/stepfun.svg"

[endpoint]
default_base_url = "https://api.stepfun.com/v1"
docs_url = "https://www.stepfun.com/docs"

[auth]
auth_header = "Authorization: Bearer {api_key}"
key_field = "api_key"

[validate_probe]
method = "GET"
path = "/models"
success_status = [200]
parser = "none"

[quota_probe]
method = "GET"
path = "/models"
parser = "none"
