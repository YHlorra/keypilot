[meta]
id = "together"
name = "Together AI"
protocol = "openai"
icon = "/icons/providers/together.svg"

[endpoint]
default_base_url = "https://api.together.xyz/v1"
docs_url = "https://docs.together.ai"

[auth]
auth_header = "Authorization: Bearer {api_key}"
key_field = "api_key"

[validate_probe]
method = "GET"
path = "/models"
success_status = [200]
parser = "none"

[quota_probe]
method = "GET"
path = "/models"
parser = "none"
