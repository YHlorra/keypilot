[meta]
id = "openrouter"
name = "OpenRouter"
protocol = "openai"
icon = "/icons/providers/openrouter.svg"

[endpoint]
default_base_url = "https://openrouter.ai/api/v1"
docs_url = "https://openrouter.ai/docs"

[auth]
auth_header = "Authorization: Bearer {api_key}"
key_field = "api_key"

[validate_probe]
method = "GET"
path = "/models"
success_status = [200]
parser = "none"

[quota_probe]
method = "GET"
path = "/models"
parser = "none"
