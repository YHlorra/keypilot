[meta]
id = "github"
name = "GitHub"
protocol = "github"
icon = "/icons/providers/github.svg"

[endpoint]
default_base_url = "https://api.github.com"
docs_url = "https://docs.github.com/en/rest"

[auth]
auth_header = "Authorization: Bearer {api_key}"
key_field = "api_key"

[validate_probe]
method = "GET"
path = "/user"
success_status = [200]
parser = "none"

[quota_probe]
method = "GET"
path = "/rate_limit"
parser = "none"
