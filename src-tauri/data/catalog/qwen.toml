[meta]
id = "qwen"
name = "阿里通义千问"
protocol = "openai"
icon = "/icons/providers/qwen.svg"

[endpoint]
default_base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
docs_url = "https://help.aliyun.com/zh/dashscope/"

[auth]
auth_header = "Authorization: Bearer {api_key}"
key_field = "api_key"

[validate_probe]
method = "GET"
path = "/models"
success_status = [200]
parser = "none"

[quota_probe]
method = "GET"
path = "/models"
parser = "none"
