[meta]
id = "openai"
name = "OpenAI"
protocol = "openai"
icon = "/icons/providers/openai.svg"

[endpoint]
default_base_url = "https://api.openai.com/v1"
docs_url = "https://platform.openai.com/docs/api-reference"

[auth]
auth_header = "Authorization: Bearer {api_key}"
key_field = "api_key"

[validate_probe]
method = "GET"
path = "/models"
success_status = [200]
parser = "none"

[quota_probe]
method = "GET"
path = "/dashboard/billing/subscription"
parser = "openai_usage"
