name: Release KeyPilot

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      sign:
        description: 'Sign with Azure Trusted Signing'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-rust@v2
        with:
          toolchain: '1.92'

      - uses: pnpm/action-setup@v4
        with:
          version: '11'

      - name: Install frontend dependencies
        run: pnpm install
        working-directory: ./webui

      - name: Build Tauri app
        run: |
          pnpm tauri build
        working-directory: ./webui

      - name: Verify WebView2 Bootstrapper
        run: |
          if (Test-Path "src-tauri\target\release\bundle\msi\WebView2Bootstrapper.exe") {
            Write-Output "WebView2Bootstrapper.exe: OK"
          } else {
            Write-Error "Missing WebView2Bootstrapper.exe"
            exit 1
          }

      - name: List bundle artifacts
        run: |
          Get-ChildItem -Path "src-tauri\target\release\bundle" -Recurse -File | Select-Object FullName, Length

      - name: Sign with Azure Trusted Signing
        if: github.event.inputs.sign == 'true' || startsWith(github.ref, 'refs/tags/v')
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_DLIB_ENDPOINT: ${{ secrets.AZURE_DLIB_ENDPOINT }}
        run: |
          # Azure Trusted Signing integration
          # Docs: https://learn.microsoft.com/en-us/azure/trusted-signing/how-to-signing-integrate
          #
          # Prerequisites (1-3 day approval process):
          # 1. Azure Trusted Signing account (https://aka.ms/trusted-signing)
          # 2. Certificate profile (created in Azure portal)
          # 3. Add secrets to GitHub repo: AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, AZURE_DLIB_ENDPOINT
          #
          # Signtool command (example):
          # signtool sign /d "KeyPilot" /du "https://keypilot.app" /td sha256 /tr http://timestamp.digicert.com /fv cert.pfx $FILE
          #
          echo "Azure Trusted Signing step (requires dlib endpoint + approved account)"
          echo "To enable: Set AZURE_DLIB_ENDPOINT in repo secrets"

      - uses: actions/upload-artifact@v4
        with:
          name: keypilot-windows-bundle
          path: |
            src-tauri\target\release\bundle\msi\*.msi
            src-tauri\target\release\bundle\nsis\*.exe
            src-tauri\target\release\bundle\WebView2Bootstrapper.exe
          retention-days: 30

  validate:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Validate release.yml syntax
        run: |
          python3 -c "import yaml; yaml.safe_load(open('.github/workflows/release.yml'))"
          echo "YAML syntax: OK"
