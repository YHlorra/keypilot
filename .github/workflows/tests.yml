name: Tests

# Reusable test suite. Consumed by ci.yml (every push / PR) and release.yml
# (as a release gate). Mirrors the project's own `init.sh` verification harness
# plus the WebUI unit tests.
on:
  workflow_call:
  workflow_dispatch:

jobs:
  verify:
    name: Verify (init.sh + unit tests)
    # Windows: matches the local dev environment and avoids the Linux-only
    # Tauri WebKit/GTK system-dependency compile trap.
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # fix-date-local-timezone regression tests assume Local == Asia/Shanghai.
      # chrono::Local on Windows reads GetTimeZoneInformation (not the TZ env
      # var that init.sh exports), so we set the OS timezone explicitly.
      # Runner is admin by default; no elevation needed.
      - name: Set timezone to China Standard Time (for chrono::Local tests)
        shell: pwsh
        run: Set-TimeZone -Id "China Standard Time"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: webui/pnpm-lock.yaml

      - name: Setup Rust 1.92
        uses: dtolnay/rust-toolchain@1.92

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./webui

      - name: Build frontend (required by tauri::generate_context!)
        run: pnpm build
        working-directory: ./webui

      # Canonical gate: cargo check, cargo test, webui typecheck,
      # hard-constraint grep (§3 of AGENTS.md), JSON validity.
      - name: Run project verification harness
        shell: bash
        run: bash init.sh

      - name: WebUI unit tests (vitest)
        run: pnpm test
        working-directory: ./webui
